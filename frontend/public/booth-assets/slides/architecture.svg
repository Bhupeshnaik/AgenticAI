<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#0f172a">9-Agent Platform Architecture</text>
  <text x="600" y="92" text-anchor="middle" font-size="16" fill="#475569">React + FastAPI + Azure OpenAI · End-to-end bank marketing</text>

  <!-- Frontend -->
  <rect x="80" y="130" width="1040" height="64" rx="12" fill="#1e293b"/>
  <text x="600" y="170" text-anchor="middle" font-size="18" font-weight="600" fill="#fff">React TypeScript Frontend  ·  Dashboard / Chat / Workflows / Booth</text>

  <!-- Backend -->
  <rect x="80" y="220" width="1040" height="64" rx="12" fill="#312e81"/>
  <text x="600" y="260" text-anchor="middle" font-size="18" font-weight="600" fill="#fff">FastAPI Backend  ·  Multi-Agent Orchestrator</text>

  <!-- Agents grid -->
  <g font-size="14" font-weight="600" fill="#fff">
    <g>
      <rect x="80"   y="320" width="115" height="80" rx="10" fill="url(#agent)"/>
      <text x="137.5" y="358" text-anchor="middle">Strategy</text>
      <text x="137.5" y="378" text-anchor="middle" font-size="11" font-weight="400">Phase 1</text>
    </g>
    <g>
      <rect x="210" y="320" width="115" height="80" rx="10" fill="url(#agent)"/>
      <text x="267.5" y="358" text-anchor="middle">Copywriting</text>
      <text x="267.5" y="378" text-anchor="middle" font-size="11" font-weight="400">Phase 2a</text>
    </g>
    <g>
      <rect x="340" y="320" width="115" height="80" rx="10" fill="url(#agent)"/>
      <text x="397.5" y="358" text-anchor="middle">Asset Prod.</text>
      <text x="397.5" y="378" text-anchor="middle" font-size="11" font-weight="400">Phase 2b–2f</text>
    </g>
    <g>
      <rect x="470" y="320" width="115" height="80" rx="10" fill="url(#agent)"/>
      <text x="527.5" y="358" text-anchor="middle">Segmentation</text>
      <text x="527.5" y="378" text-anchor="middle" font-size="11" font-weight="400">Phase 3</text>
    </g>
    <g>
      <rect x="600" y="320" width="115" height="80" rx="10" fill="#ef4444"/>
      <text x="657.5" y="358" text-anchor="middle">Compliance</text>
      <text x="657.5" y="378" text-anchor="middle" font-size="11" font-weight="400">Phase 4</text>
    </g>
    <g>
      <rect x="730" y="320" width="115" height="80" rx="10" fill="url(#agent)"/>
      <text x="787.5" y="358" text-anchor="middle">Campaign</text>
      <text x="787.5" y="378" text-anchor="middle" font-size="11" font-weight="400">Phase 5</text>
    </g>
    <g>
      <rect x="860" y="320" width="115" height="80" rx="10" fill="url(#agent)"/>
      <text x="917.5" y="358" text-anchor="middle">Lead Mgmt</text>
      <text x="917.5" y="378" text-anchor="middle" font-size="11" font-weight="400">Phase 6</text>
    </g>
    <g>
      <rect x="990" y="320" width="115" height="80" rx="10" fill="url(#agent)"/>
      <text x="1047.5" y="358" text-anchor="middle">Nurture</text>
      <text x="1047.5" y="378" text-anchor="middle" font-size="11" font-weight="400">Phase 7</text>
    </g>
    <g>
      <rect x="540" y="430" width="115" height="80" rx="10" fill="url(#agent)"/>
      <text x="597.5" y="468" text-anchor="middle">Analytics</text>
      <text x="597.5" y="488" text-anchor="middle" font-size="11" font-weight="400">Phase 8</text>
    </g>
  </g>

  <!-- Azure layer -->
  <rect x="80" y="555" width="1040" height="100" rx="12" fill="#0ea5e9"/>
  <text x="600" y="586" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">Azure Foundation</text>
  <text x="600" y="612" text-anchor="middle" font-size="13" fill="#e0f2fe">Azure OpenAI · Cosmos DB · Blob Storage · AI Search · Doc Intelligence</text>
  <text x="600" y="634" text-anchor="middle" font-size="13" fill="#e0f2fe">Communication Services · Service Bus · Container Apps · Key Vault · Monitor</text>
</svg>
